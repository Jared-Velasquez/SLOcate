apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-delay-ts-travel
  namespace: chaos-mesh
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - ts
    labelSelectors:
      app: ts-travel-service
  delay:
    latency: "1s"
    jitter: "100ms"
    correlation: "25"
  duration: "3m"
