# deploy/compose/prometheus.yml
global:
  scrape_interval:     15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs: [{ targets: ["localhost:9090"] }]

  - job_name: otel-collector-spanmetrics
    metrics_path: /metrics
    static_configs:
      # macOS + Docker Desktop: host.docker.internal resolves natively.
      # Linux fallback: add `extra_hosts: ["host.docker.internal:host-gateway"]` to the prometheus service in docker-compose.yaml.
      # The cluster's kind extraPortMapping forwards container 30889 → host 8889.
      - targets: ["host.docker.internal:8889"]
